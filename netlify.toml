[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev -- --port 5173 --strictPort"
  port = 8888
  targetPort = 5173

[[redirects]]
  from = "/support/admins"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/support/canvassers"
  to = "/index.html"
  status = 200
